<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>CONTROLO DE PRESENÇA</title>
    <style>
        /* O TEU DESIGN ANTIGO E ORIGINAL INTEGRAL */
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #161b22; padding: 20px; border-radius: 8px; border: 1px solid #30363d; }
        h2 { color: #58a6ff; text-align: center; }
        .btn { background-color: #238636; color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn:hover { background-color: #2ea043; }
        .input-box { width: 100%; padding: 10px; margin-top: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; }
        .lista { margin-top: 20px; }
        .item { background: #21262d; padding: 10px; border-radius: 6px; margin-bottom: 8px; border: 1px solid #30363d; }
        .alerta-sirene { background-color: #4c1111 !important; border-color: #f85149 !important; }
    </style>
</head>
<body>

    <div class="container" id="painelPrincipal">
        <h2>PAINEL DE CONTROLO</h2>
        
        <button class="btn" style="background-color: #1f6feb;" onclick="entrarNoQG()">Autenticar Agente</button>
        
        <input type="text" id="missaoDesc" class="input-box" placeholder="Nova Missão...">
        <input type="text" id="missaoSetor" class="input-box" placeholder="Setor / Coordenadas...">
        <button class="btn" onclick="enviarNovaMissao()">Lançar Missão</button>

        <div class="lista" id="listaDeMissoes"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // Teu Firebase estável
        const firebaseConfig = { 
            apiKey: "AIzaSyA0L_KIg0VA41_pfHUON-XJf3yz7...", 
            databaseURL: "https://area51-matanga-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Chaves agora protegidas em SHA-256 (Ninguém consegue ler no código fonte do GitHub)
        const chavesPermitidas = {
            "7c26ecee7ff804e101f3db9cf8ff6719b0d19e67d4f3e6704bf1f88a2b534442": "yelseik", // hash de yelseik99
            "0714fc2a76f2fc71b870ef46087b3240212a7638d9482d334000f4f982121011": "aihosj"   // hash de aihosj01
        };

        function pegarUsuario() { return sessionStorage.getItem("user_sessao"); }

        function entrarNoQG() {
            let chave = prompt("DIGITE A SUA CHAVE:");
            if(!chave) return;
            let hash = CryptoJS.SHA256(chave).toString();

            if(hash in chavesPermitidas) {
                let nome = chavesPermitidas[hash];
                sessionStorage.setItem("user_sessao", nome);
                alert("Acesso Confirmado: " + nome);
            } else {
                ativarArmadilhaRadar(hash);
            }
        }

        async function activarArmadilhaRadar(hashIncorreto) {
            document.getElementById("painelPrincipal").classList.add("alerta-sirene");
            let ip = await fetch('https://api.ipify.org').then(r => r.text()).catch(() => "Desconhecido");
            database.ref('logs').push({ alerta: `🚨 INVASOR DETETADO! IP: ${ip} | Tentou usar hash: ${hashIncorreto}` });
            alert("🚨 CHAVE FAILA! SISTEMA DE SEGURANÇA ATIVADO.");
            setTimeout(() => { document.getElementById("painelPrincipal").classList.remove("alerta-sirene"); }, 5000);
        }

        function enviarNovaMissao() {
            let criador = pegarUsuario();
            if(criador !== "yelseik") return alert("Negado: Apenas yelseik pode lançar missões.");

            let desc = document.getElementById("missaoDesc").value;
            let setor = document.getElementById("missaoSetor").value || "Geral";

            if(desc.trim() !== "") {
                database.ref('tarefas').push({ desc, setor, status: "PENDENTE", relatorio: "Nenhum" });
                document.getElementById("missaoDesc").value = "";
                document.getElementById("missaoSetor").value = "";
            }
        }

        // Mostra as missões exatamente como antes
        database.ref('tarefas').on('value', (snapshot) => {
            const lista = document.getElementById("listaDeMissoes");
            lista.innerHTML = "";
            const dados = snapshot.val();
            if(dados) {
                Object.keys(dados).forEach(id => {
                    let m = dados[id];
                    lista.innerHTML += `<div class="item" onclick="concluirOperacao('${id}', '${m.status}')">
                        <strong>${m.desc}</strong><br>
                        <small style="color:#8b949e;">📍 Setor: ${m.setor} | Estado: ${m.status}</small><br>
                        <small style="color:#58a6ff;">Relatório: ${m.relatorio}</small>
                    </div>`;
                });
            }
        });

        function concluirOperacao(id, statusAtual) {
            if(!pegarUsuario()) return alert("Autentique-se primeiro.");
            if(statusAtual === "CONCLUÍDO") return alert("Esta missão já está fechada.");

            let relatorio = prompt("PROTOCOLO OBRIGATÓRIO: Escreva o relatório de encerramento:");
            if(!relatorio) return alert("Cancelado. O relatório é obrigatório para fechar a missão.");

            database.ref('tarefas/' + id).update({ status: "CONCLUÍDO", relatorio: relatorio });
        }
    </script>
</body>
</html>
